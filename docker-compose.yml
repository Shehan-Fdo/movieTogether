version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=5000
      - NODE_ENV=production
    volumes:
      - movies_data:/app/backend/data/movies
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "8443:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - movies_data:/var/www/movies:ro
    depends_on:
      - backend
    restart: always

volumes:
  movies_data:
